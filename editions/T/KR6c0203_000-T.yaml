body:
  text: 大唐新翻護國仁王般若經序代宗皇帝製皇矣至覺子于元元截有海以般若之舟剪稠林以智慧之劍綿絡六合羅十方弘宣也深志應也大自權輿天竺泳沫漢庭行無緣之慈納常樂之域信其博施傾芥城而逾遠仰夫湛寂超言象之又玄五始不究其初一得罔根其本以彼取此何其遼哉朕忝嗣鴻休丕承大寶軫推溝以夕惕方徹枕而假寐夫其鎮乾坤遏寇虐和風雨著星辰與物無為乂人艱止不有般若其能已乎朕嘗澡身定泉宅心道祕緬尋龍宮之藏稽合鷲峰之旨懿夫護國實在茲經竊景行於波斯庶闡揚於調御至若高張五忍足明側隱之深永祛眾難寔惟化清之本名假法假心空色空推之於無則境智都寂引之於有迺津梁不窮思與黎蒸共臻實相而緹油貝葉文字參差東夏西天言音訛謬致使古今翻譯清濁不同前後參詳輕重匪一其猶大輅終繼事而增華譬彼堅氷始積水而非厲先之所譯語質未融披讀之流臨文三覆凡諸釋氏良用慨然先聖翹誠玉毫澹慮真境發揮滿教搜綴缺文詔大德三藏沙門不空推校詳譯未周部卷三藏學究二諦教傳三密義了宗極伊成字圓褰裳西指汎盃南海影與形對勤將歲深妙印度之聲明洞中華之韻曲甘露沃朕香風襲予既而梵夾遠齎洪鍾待扣佇延吹萬之籟率訓開三之典朕哀纏欒棘悲感霜露捧戴遺詔不敢怠遑延振錫之群英終為山之九仞開府朝恩許國以身歸佛以命弼我真教申夫妙門爰令集京城義學大德良賁等翰林學士常袞等於大明宮南桃園詳譯護國般若畢并更寫定密嚴等經握槧含毫研精賾邃曩者訛略刊定較然昔之沈隱鉤索煥矣足可懸諸日月大燭昏衢潤之雲雨橫流動植伏願上資仙駕飛慧雲於四天逈出塵勞躡金蓮於十地朕理昧幽關文慙麗則見推序述惋撫空懷聊紀之於首篇庶克開于厥後將發皇永永可推而行之時旃蒙歲木槿榮月也
